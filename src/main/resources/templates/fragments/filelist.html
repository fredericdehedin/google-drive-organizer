<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="filelist">
    <div th:if="${driveFiles != null and !driveFiles.isEmpty()}">
        <div class="file-grid">
            <article class="file-card" th:each="file : ${driveFiles}"
                     x-data="archiveProgress()"
                     th:data-file-id="${file.id()}"
                     th:data-file-name="${file.name()}">
                <div x-show="isOpen" x-cloak class="archive-overlay" x-transition>
                    <article class="archive-overlay-panel">
                        <header>Archiving file...</header>
                        <ul class="archive-step-list">
                            <template x-for="s in steps" :key="s.step">
                                <li class="archive-step-row">
                                    <span class="step-icon"
                                          :class="{ 'step-icon--done': s.status === 'done', 'step-icon--failed': s.status === 'failed' }">
                                        <span x-show="s.status === 'running'" class="step-spinner" aria-hidden="true"></span>
                                        <span x-show="s.status === 'done'"    aria-hidden="true">&#10003;</span>
                                        <span x-show="s.status === 'failed'"  aria-hidden="true">&#10007;</span>
                                    </span>
                                    <span class="step-message" x-text="s.message"></span>
                                </li>
                            </template>
                        </ul>
                        <footer x-show="isTerminal">
                            <button type="button" class="secondary" @click="closeOverlay()">Close</button>
                        </footer>
                    </article>
                </div>
                <header class="file-card-header">
                    <img th:src="${file.iconLink()}"
                         th:alt="'Icon for ' + ${file.name()}"
                         class="file-icon"
                         th:if="${file.iconLink() != null}">
                    <span class="file-name" th:text="${file.name()}">File Name</span>
                </header>
                <div class="file-preview">
                    <img th:if="${file.thumbnailLink() != null}"
                         th:src="@{/api/thumbnails/{fileId}(fileId=${file.id()})}"
                         th:alt="'Thumbnail for ' + ${file.name()}"
                         class="file-thumbnail"
                         loading="lazy">
                    <img th:if="${file.thumbnailLink() == null and file.iconLink() != null}"
                         th:src="${file.iconLink()}"
                         th:alt="'Icon for ' + ${file.name()}"
                         class="file-icon-large">
                </div>
                <footer class="file-card-footer">
                    <button type="button" class="archive-button"
                            :disabled="isOpen && !isTerminal"
                            @click="startArchive($el.closest('[data-file-id]').dataset.fileId, $el.closest('[data-file-name]').dataset.fileName)">
                        Archive
                    </button>
                </footer>
            </article>
        </div>
    </div>
    <div th:if="${driveFiles == null or driveFiles.isEmpty()}">
        <p>No files found in the configured folder.</p>
    </div>
    <script>
        function archiveProgress() {
            return {
                isOpen: false,
                steps: [],
                eventSource: null,

                get isTerminal() {
                    const last = this.steps[this.steps.length - 1];
                    return last && (last.status === 'done' || last.status === 'failed');
                },

                closeOverlay() {
                    this.isOpen = false;
                    this.steps = [];
                },

                startArchive(fileId, fileName) {
                    this.steps = [];
                    this.isOpen = true;
                    this.eventSource = new EventSource('/api/files/' + fileId + '/archive/progress');

                    this.eventSource.addEventListener('progress', (e) => {
                        const data = JSON.parse(e.data);
                        const prev = this.steps[this.steps.length - 1];
                        if (prev && prev.status === 'running') {
                            prev.status = data.step === 'FAILED' ? 'failed' : 'done';
                        }
                        if (data.step !== 'DONE') {
                            this.steps.push({ step: data.step, message: data.message, status: 'running' });
                        }
                        if (data.step === 'DONE' || data.step === 'FAILED') {
                            this.eventSource.close();
                            if (data.step === 'DONE') setTimeout(() => this.closeOverlay(), 2000);
                        }
                    });

                    this.eventSource.onopen = () => {
                        fetch('/api/files/' + fileId + '/archive?fileName=' + encodeURIComponent(fileName))
                            .then(response => {
                                if (!response.ok) this._handleError('Archive request failed');
                            })
                            .catch(() => this._handleError('Network error'));
                    };

                    this.eventSource.onerror = () => {
                        if (!this.isTerminal) this._handleError('Connection error');
                    };
                },

                _handleError(msg) {
                    const prev = this.steps[this.steps.length - 1];
                    if (prev && prev.status === 'running') prev.status = 'failed';
                    this.steps.push({ step: 'FAILED', message: msg, status: 'failed' });
                    if (this.eventSource) this.eventSource.close();
                }
            };
        }
    </script>
</div>
</body>
</html>
