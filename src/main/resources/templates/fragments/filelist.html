<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="filelist">
    <div th:if="${driveFiles != null and !driveFiles.isEmpty()}">
        <div class="file-grid">
            <article class="file-card" th:each="file : ${driveFiles}"
                     x-data="suggestTargetFolderProgress()"
                     th:data-file-id="${file.id()}"
                     th:data-file-name="${file.name()}">
                <div x-show="isOpen" x-cloak class="archive-overlay" x-transition>
                    <article class="archive-overlay-panel">
                        <header>Suggesting target folder...</header>
                        <ul class="archive-step-list">
                            <template x-for="s in steps" :key="s.step">
                                <li class="archive-step-row">
                                    <span class="step-icon"
                                          :class="{ 'step-icon--done': s.status === 'done', 'step-icon--failed': s.status === 'failed' }">
                                        <span x-show="s.status === 'running'" class="step-spinner" aria-hidden="true"></span>
                                        <span x-show="s.status === 'done'"    aria-hidden="true">&#10003;</span>
                                        <span x-show="s.status === 'failed'"  aria-hidden="true">&#10007;</span>
                                    </span>
                                    <span class="step-message" x-text="s.message"></span>
                                </li>
                            </template>
                        </ul>
                        <p x-show="targetFolder" class="archive-target-folder"
                           x-text="'Evaluated target folder: ' + targetFolder"></p>
                        <footer x-show="isTerminal">
                            <button type="button"
                                    x-show="targetFolder && steps[steps.length - 1]?.status === 'done'"
                                    x-text="'Move to \'' + targetFolder + '\''"
                                    @click="moveFile(fileId, targetFolder)">
                            </button>
                            <button type="button" class="secondary" @click="closeOverlay()">Close</button>
                        </footer>
                    </article>
                </div>
                <header class="file-card-header">
                    <img th:src="${file.iconLink()}"
                         th:alt="'Icon for ' + ${file.name()}"
                         class="file-icon"
                         th:if="${file.iconLink() != null}">
                    <span class="file-name" th:text="${file.name()}">File Name</span>
                </header>
                <div class="file-preview">
                    <img th:if="${file.thumbnailLink() != null}"
                         th:src="@{/api/thumbnails/{fileId}(fileId=${file.id()})}"
                         th:alt="'Thumbnail for ' + ${file.name()}"
                         class="file-thumbnail"
                         loading="lazy">
                    <img th:if="${file.thumbnailLink() == null and file.iconLink() != null}"
                         th:src="${file.iconLink()}"
                         th:alt="'Icon for ' + ${file.name()}"
                         class="file-icon-large">
                </div>
                <footer class="file-card-footer">
                    <button type="button" class="archive-button"
                            :disabled="isOpen && !isTerminal"
                            @click="startSuggestTargetFolder($el.closest('[data-file-id]').dataset.fileId, $el.closest('[data-file-name]').dataset.fileName)">
                        Suggest target folder
                    </button>
                </footer>
            </article>
        </div>
    </div>
    <div th:if="${driveFiles == null or driveFiles.isEmpty()}">
        <p>No files found in the configured folder.</p>
    </div>
    <script th:src="@{/js/move-file.js}"></script>
    <script th:src="@{/js/suggest-target-folder-progress.js}"></script>
</div>
</body>
</html>
