spring:
  application:
    name: google-drive-organizer
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_OAUTH_CLIENT_ID}
            client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET}
            scope:
            - openid
            - profile
            - email
            - https://www.googleapis.com/auth/drive
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

drive:
  root-folder-id: ${GOOGLE_DRIVE_FOLDER_ID}

ocr:
  language: deu+eng
  tesseract-path: C:\\Program Files\\Tesseract-OCR
  tessdata-path: C:\\Program Files\\Tesseract-OCR\\tessdata

thumbnail:
  cache:
    directory: ${THUMBNAIL_CACHE_DIR:./cache/thumbnails}

drive-organizer:
  ai:
    base-url: ${AI_BASE_URL}
    completions-path: /chat/completions
    api-key: ${AI_API_KEY}
    model: ${AI_MODEL}

server:
  port : 8081