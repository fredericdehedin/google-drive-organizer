name: CI

on:
  push:
    branches:
      - "main"
      - "feature/**"
      - "bugfix/**"
      - "hotfix/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Grant execute permission for Gradle
        run: chmod +x ./gradlew

      - name: Run tests (excluding @Tag("integration"))
        run: ./gradlew test --parallel -DexcludeTags=integration

      - name: Generate JaCoCo coverage report
        run: ./gradlew jacocoTestReport

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html  # or 'build/reports/jacoco/' for all